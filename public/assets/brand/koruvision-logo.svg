<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" role="img" aria-label="KoruVision">
  <defs>
    <radialGradient id="eyeL" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#FFD666"/>
      <stop offset="45%" stop-color="#FFC233"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </radialGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8ECF8"/>
      <stop offset="50%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#E8ECF8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="480" fill="#03060F"/>
  <!-- Owl brows -->
  <path d="M80 140 Q200 60 320 140" fill="none" stroke="url(#chrome)" stroke-width="14" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="130" cy="200" r="52" fill="#1a1030" stroke="url(#chrome)" stroke-width="8" filter="url(#glow)"/>
  <circle cx="130" cy="200" r="32" fill="url(#eyeL)"/>
  <circle cx="270" cy="200" r="52" fill="#1a1030" stroke="url(#chrome)" stroke-width="8" filter="url(#glow)"/>
  <circle cx="270" cy="200" r="32" fill="url(#eyeL)"/>
  <!-- Center violet sensor -->
  <rect x="188" y="168" width="24" height="64" rx="12" fill="#8B5CF6" opacity="0.9"/>
  <circle cx="200" cy="158" r="10" fill="#A78BFA"/>
  <!-- Wordmark -->
  <text x="200" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="42">
    <tspan fill="#FFC233">KORU</tspan><tspan fill="#8B5CF6">VISION</tspan>
  </text>
  <text x="200" y="380" text-anchor="middle" fill="#D4A017" font-family="system-ui,sans-serif" font-size="14" letter-spacing="6">INTELIG NCIA ∑ VIS√O ∑ SOLU«’ES</text>
</svg>
