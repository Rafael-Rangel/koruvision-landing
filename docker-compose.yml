name: koruvision-landing

services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CRM_URL: ${NEXT_PUBLIC_CRM_URL:-https://crm.koruvision.com.br}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://koruvision.com.br}
        NEXT_PUBLIC_ENABLE_VIDEO: ${NEXT_PUBLIC_ENABLE_VIDEO:-false}
    container_name: koruvision-landing
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LANDING_PORT:-13002}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CRM_URL=${NEXT_PUBLIC_CRM_URL:-https://crm.koruvision.com.br}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://koruvision.com.br}
